appId: com.145U.Unblur
---
# 002: Episode List E2E Test
# Requires: real Supabase credentials in .env, episodes synced in DB

- launchApp
- assertVisible: "Unblur"

# Wait for initial load (episodes have titles, wait for any content)
- extendedWaitUntil:
    visible: ".*ago.*|.*202[0-9].*"
    timeout: 10000

# Scroll down to trigger pagination
- scrollUntilVisible:
    element:
      text: ".*"
    direction: DOWN
    timeout: 5000

# Scroll back up
- scrollUntilVisible:
    element:
      text: "Unblur"
    direction: UP
    timeout: 5000

# Pull to refresh
- swipe:
    start: "50%, 30%"
    end: "50%, 80%"
    duration: 500

# Verify list is still visible after refresh
- assertVisible: "Unblur"
